<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://cdn.jsdelivr.net/gh/RPDevJesco/ZephyrJS@0.03/zephyrcore/zephyr.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/RPDevJesco/ZephyrJS@0.03/zephyrtemplates/ZephyrCore.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Doe - Junior Developer Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/RPDevJesco/ZephyrJS@0.03/zephyrcss/variables.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/RPDevJesco/ZephyrJS@0.03/zephyrcss/zephyr.css">
    <style>
        body {
            font-family: var(--font-family-sans-serif);
            background-color: var(--background-color);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
        }
        .section {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
<layout-component>
    <header slot="top">
        <h1>Jane Doe</h1>
        <p>Junior Full Stack Developer | Recent CS Graduate</p>
    </header>

    <nav slot="left">
        <custom-button onclick="scrollToSection('about')">About Me</custom-button>
        <custom-button onclick="scrollToSection('skills')">Skills</custom-button>
        <custom-button onclick="scrollToSection('projects')">Projects</custom-button>
        <custom-button onclick="scrollToSection('contact')">Contact</custom-button>
    </nav>

    <main slot="center">
        <section id="about" class="section">
            <basic-card>
                <h2 slot="header">About Me</h2>
                <div slot="content">
                    <markdown-renderer markdown-content="
                            Hello! I'm Jane Doe, a recent Computer Science graduate with a passion for web development and problem-solving. I'm eager to apply my skills in a professional setting and contribute to innovative projects.

                            - 🎓 BSc in Computer Science from Tech University
                            - 💻 Proficient in full-stack development
                            - 🌱 Always learning and exploring new technologies
                        "></markdown-renderer>
                </div>
            </basic-card>
        </section>

        <section id="skills" class="section">
            <h2>Skills</h2>
            <accordion-component id="skillsAccordion"></accordion-component>
        </section>

        <section id="projects" class="section">
            <h2>Projects</h2>
            <accordion-component id="projectsAccordion"></accordion-component>
        </section>

        <section id="contact" class="section">
            <basic-card>
                <h2 slot="header">Contact Me</h2>
                <div slot="content">
                    <markdown-renderer markdown-content="
                            I'm excited about new opportunities and collaborations. Feel free to reach out:

                            - 📧 Email: [jane.doe@example.com](mailto:jane.doe@example.com)
                            - 🔗 LinkedIn: [linkedin.com/in/janedoe](https://www.linkedin.com/in/janedoe)
                            - 💻 GitHub: [github.com/janedoe](https://github.com/janedoe)
                        "></markdown-renderer>
                </div>
            </basic-card>
        </section>
    </main>

    <footer slot="bottom">
        <p>&copy; 2024 Jane Doe. All rights reserved.</p>
    </footer>
</layout-component>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Set up skills accordion
        const skillsAccordion = document.getElementById('skillsAccordion');
        skillsAccordion.setItems([
            {
                header: 'Programming Languages',
                content: 'JavaScript (ES6+), Python, Java, HTML5, CSS3'
            },
            {
                header: 'Frameworks & Libraries',
                content: 'React.js, Node.js, Express.js, Django, Bootstrap'
            },
            {
                header: 'Databases',
                content: 'MongoDB, MySQL, PostgreSQL'
            },
            {
                header: 'Tools & Technologies',
                content: 'Git, Docker, AWS (basic), RESTful APIs, Agile methodologies'
            }
        ]);

        // Set up projects accordion
        const projectsAccordion = document.getElementById('projectsAccordion');
        projectsAccordion.setItems([
            {
                header: 'E-commerce Website (Capstone Project)',
                content: `
                        <markdown-renderer markdown-content="
                            Built a full-stack e-commerce website as part of my capstone project.

                            **Technologies used:** React.js, Node.js, Express.js, MongoDB

                            **Key features:**
                            - User authentication
                            - Product catalog with search and filter
                            - Shopping cart and checkout process
                            - Admin panel for product management

                            **Sample Code (React component for product display):**
                            \`\`\`js
                            import React from 'react';

                            const ProductCard = ({ product }) => {
                                return (
                                    <div className='product-card'>
                                        <img src={product.image} alt={product.name} />
                                        <h3>{product.name}</h3>
                                        <p>{product.price}</p>
                                        <button>Add to Cart</button>
                                    </div>
                                );
                            };

                            export default ProductCard;
                            \`\`\`
                        "></markdown-renderer>
                    `
            },
            {
                header: 'Weather App',
                content: `
                        <markdown-renderer markdown-content="
                            Developed a weather application that fetches and displays weather data from an API.

                            **Technologies used:** JavaScript, HTML5, CSS3, OpenWeatherMap API

                            **Key features:**
                            - Current weather display
                            - 5-day forecast
                            - Geolocation support
                            - Responsive design

                            **Sample Code (Fetch weather data):**
                            \`\`\`js
                            async function getWeatherData(city) {
                                const API_KEY = 'your_api_key_here';
                                const URL = \`https://api.openweathermap.org/data/2.5/weather?q=\${city}&appid=\${API_KEY}&units=metric\`;

                                try {
                                    const response = await fetch(URL);
                                    const data = await response.json();
                                    return data;
                                } catch (error) {
                                    console.error('Error fetching weather data:', error);
                                }
                            }
                            \`\`\`
                        "></markdown-renderer>
                    `
            },
            {
                header: 'Task Management CLI (Python)',
                content: `
                        <markdown-renderer markdown-content="
                            Created a command-line interface for managing tasks and to-do lists.

                            **Technologies used:** Python, SQLite

                            **Key features:**
                            - Add, view, update, and delete tasks
                            - Set due dates and priorities
                            - Data persistence using SQLite
                            - Command-line argument parsing

                            **Sample Code (Task addition):**

                            \`\`\`py
                            import sqlite3
                            from datetime import datetime

                            def add_task(conn, title, due_date=None, priority='medium'):
                                cur = conn.cursor()
                                created_at = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
                                cur.execute('''
                                    INSERT INTO tasks (title, due_date, priority, created_at)
                                    VALUES (?, ?, ?, ?)
                                ''', (title, due_date, priority, created_at))
                                conn.commit()
                                print(f'Task '{title}' added successfully.')

                            # Usage
                            conn = sqlite3.connect('tasks.db')
                            add_task(conn, 'Complete portfolio website', '2024-08-01', 'high')
                            conn.close()
                            \`\`\`
                        "></markdown-renderer>
                    `
            }
        ]);
    });

    function scrollToSection(sectionId) {
        document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
