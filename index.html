<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZephyrJS Components</title>
    <link rel="stylesheet" href="./zephyrcss/zephyr.css">
</head>
<body style="background: var(--body-color)">

<basic-card>
    <div slot="header">My Card Title</div>
    <div slot="content">This is the card content.</div>
</basic-card>

<modal-dialog>
    <div slot="header">Dialog Header</div>
    <div slot="body">Dialog Body</div>
</modal-dialog>

<notification-box type="success" auto-dismiss="3000" class="d-block mt-3">
    <span slot="icon" class="icon">&#10004;&#xFE0F;</span>
    <span slot="header" class="text-primary">Success</span>
    <span slot="body" class="text-dark">This is a success notification.</span>
</notification-box>

<notification-box type="error" class="d-block mt-3">
    <span slot="icon" class="icon">&#10060;</span>
    <span slot="header" class="text-danger">Error</span>
    <span slot="body" class="text-dark">This is an error notification.</span>
</notification-box>

<custom-button class="d-block mt-3">Click Me</custom-button>

<custom-input class="d-block mt-3"></custom-input>

<custom-dropdown class="d-block mt-3">
    <option value="option1">Option 1</option>
    <option value="option2">Option 2</option>
    <option value="option3">Option 3</option>
</custom-dropdown>

<user-profile class="d-block mt-3"></user-profile>

<markdown-renderer class="d-block mt-3" markdown="
# Hello World!

This is **Markdown** rendered in a web component.

Here is some inline code: \`console.log('Hello, world!');\`

And here is a code block:

\`\`\`
function greet() {
    console.log('Hello, world!');
}
greet();
\`\`\`
"></markdown-renderer>


<script type="module" src="./zephyrtemplates/ZephyrCore.js"></script>
</body>
</html>
