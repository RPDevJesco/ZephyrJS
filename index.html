```js
class CountdownTimer {
    constructor(timeSec) {
        this.timeSec = timeSec;
    }

    start() {
        const timer = setInterval(() => {
            if (this.timeSec <= 0) {
                clearInterval(timer);
                console.log('stop');
                return;
            }
            let mins = Math.floor(this.timeSec / 60);
            let secs = this.timeSec % 60;
            let timeformat = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            console.log(timeformat);
            this.timeSec -= 1;
        }, 1000);
    }
}

// Example usage
const timer = new CountdownTimer(5);
timer.start();
```

```py
import time

class CountdownTimer:
    def __init__(self, time_sec):
        self.time_sec = time_sec

    def start(self):
        while self.time_sec:
            mins, secs = divmod(self.time_sec, 60)
            timeformat = '{:02d}:{:02d}'.format(mins, secs)
            print(timeformat, end='\r')
            time.sleep(1)
            self.time_sec -= 1

        print('stop')

# Example usage
timer = CountdownTimer(5)
timer.start()
