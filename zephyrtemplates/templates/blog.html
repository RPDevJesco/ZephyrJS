<template id="blog">
    <style>
        .blog-container {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .new-post {
            margin-bottom: 20px;
        }
        .new-post textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        .post {
            background-color: #f0f2f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .author {
            font-weight: bold;
        }
        .timestamp {
            color: #65676B;
        }
        .post-content h2 {
            margin-top: 0;
        }
        .post-actions {
            margin-top: 10px;
        }
        .post-actions button {
            margin-right: 10px;
        }
        .comments {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
        }
        .comment {
            margin-bottom: 5px;
        }
        .comment-author {
            font-weight: bold;
        }
        .new-comment {
            margin-top: 10px;
        }
        .new-comment input {
            width: calc(100% - 80px);
        }
        .read-more {
            color: #1877F2;
            cursor: pointer;
        }
    </style>

    <div class="blog-container">
        <div class="new-post">
            <textarea bind="{{newPostContent}}" placeholder="What's on your mind?"></textarea>
            <button on="click:{{createPost}}">Post</button>
        </div>
        <div class="posts">
            <!-- Posts will be dynamically inserted here -->
        </div>
    </div>
</template>
