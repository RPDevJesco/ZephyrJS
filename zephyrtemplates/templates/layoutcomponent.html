<template id="layoutcomponent">
    <style>
        :host {
            display: grid;
            grid-template-areas:
                        "top top top"
                        "left sidebar right"
                        "bottom bottom bottom";
            grid-template-rows: auto 1fr auto;
            grid-template-columns: auto 1fr auto;
            height: 100vh;
        }

        ::slotted([slot="top"]) {
            grid-area: top;
            background-color: var(--primary-color, #007bff);
            color: var(--light-text, #fff);
        }

        ::slotted([slot="left"]) {
            grid-area: left;
            background-color: var(--accent-color, #ccc);
            color: var(--dark-text, #333);
        }

        ::slotted([slot="sidebar"]) {
            grid-area: sidebar;
            background-color: var(--accent-color, #ddd);
            color: var(--dark-text, #333);
        }

        ::slotted([slot="right"]) {
            grid-area: right;
            background-color: var(--accent-color, #ccc);
            color: var(--dark-text, #333);
        }

        ::slotted([slot="bottom"]) {
            grid-area: bottom;
            background-color: var(--primary-color, #007bff);
            color: var(--light-text, #fff);
        }

        ::slotted([slot="center"]) {
            grid-area: sidebar / left / span 2 / span 2;
            background-color: var(--body-bg, #f8f9fa);
            color: var(--dark-text, #333);
            overflow-y: auto;
        }

        /* Fine-grained controls for nested areas */
        .top-left {
            grid-area: top-left;
        }
        .top-right {
            grid-area: top-right;
        }
        .bottom-left {
            grid-area: bottom-left;
        }
        .bottom-right {
            grid-area: bottom-right;
        }

        /* Default styles */
        .top, .left, .sidebar, .right, .bottom, .center {
            padding: 1rem;
        }
    </style>
    <slot name="top"></slot>
    <slot name="left"></slot>
    <slot name="sidebar"></slot>
    <slot name="right"></slot>
    <slot name="bottom"></slot>
    <slot name="center"></slot>
    <!-- Nested areas -->
    <slot name="top-left" class="top-left"></slot>
    <slot name="top-right" class="top-right"></slot>
    <slot name="bottom-left" class="bottom-left"></slot>
    <slot name="bottom-right" class="bottom-right"></slot>
</template>
