<template id="accordion-template">
    <style>
        .accordion-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .accordion-item {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            color: var(--dark-text);
        }
        .accordion-header {
            background-color: var(--card-bg);
            padding: 10px;
            cursor: pointer;
            color: var(--dark-text);
        }
        .accordion-content {
            display: none;
            padding: 10px;
            background-color: var(--card-bg);
            color: var(--dark-text);
        }
    </style>
    <div class="accordion-container"></div>
</template>
