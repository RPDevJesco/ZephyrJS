<template id="accordion-template">
    <style>
        .accordion-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-small, 10px);
        }
        .accordion-item {
            border: 1px solid var(--neutral-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            color: var(--dark-text);
        }
        .accordion-header {
            background-color: var(--card-bg);
            padding: var(--spacing-small, 10px);
            cursor: pointer;
            color: var(--dark-text);
        }
        .accordion-content {
            display: none;
            padding: var(--spacing-small, 10px);
            background-color: var(--card-bg);
            color: var(--dark-text);
        }
    </style>
    <div class="accordion-container"></div>
</template>
