<template id="zephyr-timeline-item">
    <style>
        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }
        .circle {
            width: 40px;
            height: 40px;
            background-color: var(--primary-color, #007bff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin: 20px;
        }
        .title {
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
    <div class="timeline-item">
        <div class="circle">
            <slot name="date"></slot>
        </div>
        <div class="title">
            <slot name="title"></slot>
        </div>
        <div class="description">
            <slot name="description"></slot>
        </div>
        <div class="content" style="display:none;">
            <slot name="content"></slot>
        </div>
    </div>
</template>
