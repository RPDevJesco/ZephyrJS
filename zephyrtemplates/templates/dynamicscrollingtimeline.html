<template id="dynamic-scrolling-timeline-template">
    <style>
        .timeline {
            width: 100%;
            height: 400px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
        }
        .event {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .event-title { font-weight: bold; }
        .event-date { font-style: italic; }
        .event.overview-detail .event-description { display: none; }
        .event.medium-detail .event-description {
            max-height: 3em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .debug-info {
            position: sticky;
            top: 0;
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 5px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
    <div class="timeline">
        <!-- Events will be dynamically inserted here -->
    </div>
</template>
