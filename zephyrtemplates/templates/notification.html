<template id="notification">
    <style>
        :host {
            display: block;
            padding: var(--notification-padding);
            background: var(--notification-background);
            border-left: 5px solid var(--notification-border-color);
            margin-bottom: var(--spacing-medium, 16px);
            position: relative;
            transition: opacity 0.3s ease, transform 0.3s ease;
            font-family: var(--font-family-sans-serif);
            color: var(--light-text);
            box-shadow: var(--shadow-light);
        }
        :host([hidden]) {
            display: none;
        }
        :host([type="success"]) {
            border-color: var(--success-color);
            background: var(--success-background);
        }
        :host([type="error"]) {
            border-color: var(--danger-color);
            background: var(--danger-background);
        }
        :host([type="warning"]) {
            border-color: var(--warning-color);
            background: var(--warning-background);
        }
        .header {
            font-weight: bold;
            margin-bottom: var(--spacing-small, 8px);
            color: var(--primary-color);
        }
        .body {
            font-size: var(--notification-font-size);
        }
        .close-button {
            position: absolute;
            top: var(--spacing-small, 8px);
            right: var(--spacing-small, 8px);
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        .close-button:hover {
            color: var(--accent-color);
        }
        .icon {
            margin-right: var(--spacing-small, 8px);
        }
    </style>
    <button class="close-button" aria-label="Close">&times;</button>
    <div class="header">
        <slot name="icon"></slot>
        <slot name="header"></slot>
    </div>
    <div class="body">
        <slot name="body"></slot>
    </div>
</template>
