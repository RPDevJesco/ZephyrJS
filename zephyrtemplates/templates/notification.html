<template id="notification">
    <style>
        :host {
            display: block;
            padding: var(--notification-padding, 16px);
            background: var(--notification-background, var(--light-color));
            border-left: 5px solid var(--notification-border-color, var(--primary-color));
            margin-bottom: 16px;
            position: relative;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        :host([hidden]) {
            display: none;
        }
        :host([type="success"]) {
            border-color: var(--success-color);
            background: var(--success-color);
            color: var(--light-color);
        }
        :host([type="error"]) {
            border-color: var(--danger-color);
            background: var(--danger-color);
            color: var(--light-color);
        }
        :host([type="warning"]) {
            border-color: var(--warning-color);
            background: var(--warning-color);
            color: var(--dark-color);
        }
        .header {
            font-weight: bold;
            margin-bottom: 8px;
        }
        .body {
            font-size: var(--notification-font-size, 1em);
        }
        .close-button {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: inherit;
        }
        .icon {
            margin-right: 8px;
        }
    </style>
    <button class="close-button" aria-label="Close">&times;</button>
    <div class="header">
        <slot name="icon"></slot>
        <slot name="header"></slot>
    </div>
    <div class="body">
        <slot name="body"></slot>
    </div>
</template>
