<template id="user-profile">
    <style>
        .user-profile {
            border: 1px solid var(--neutral-color);
            padding: var(--card-padding);
            border-radius: var(--card-border-radius);
            max-width: 300px;
            text-align: center;
            background-color: var(--background-color);
            color: var(--dark-text);
            font-family: var(--font-family-sans-serif);
        }
        .user-profile h2 {
            margin-top: var(--spacing-none, 0);
        }
        .user-profile img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
        }
    </style>
    <div class="user-profile">
        <img data-bind="image" src="" alt="User Image"/>
        <h2 data-bind="name"></h2>
        <p><strong>Email:</strong> <span data-bind="email"></span></p>
        <p><strong>Phone:</strong> <span data-bind="phone"></span></p>
    </div>
</template>
