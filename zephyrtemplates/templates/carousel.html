<template id="carousel">
    <style>
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
        }
        .carousel-items {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-item {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .carousel-item img {
            max-width: 100%;
            max-height: 60%;
            object-fit: contain;
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            text-decoration: none;
            font-size: 18px;
            z-index: 10;
        }
        .carousel-prev {
            left: 10px;
        }
        .carousel-next {
            right: 10px;
        }
        .carousel-indicators {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .carousel-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
        }
        .carousel-indicator.active {
            background: white;
        }
    </style>
    <div class="carousel-container">
        <div class="carousel-items"></div>
        <a href="#" class="carousel-nav carousel-prev">&lt;</a>
        <a href="#" class="carousel-nav carousel-next">&gt;</a>
        <div class="carousel-indicators"></div>
    </div>
</template>
